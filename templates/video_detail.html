<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ video_rel }} — YT Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0c;--surface:#111116;--border:#1e1e28;--accent:#ff3f3f;
  --accent2:#ffaa00;--green:#00e676;--text:#e8e8f0;--muted:#6b6b80;
  --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
nav{display:flex;align-items:center;gap:16px;padding:0 32px;height:56px;
  border-bottom:1px solid var(--border);background:var(--surface);
  position:sticky;top:0;z-index:100;}
.logo{font-family:var(--mono);font-size:13px;letter-spacing:3px;color:var(--accent);}
.breadcrumb{color:var(--muted);font-size:13px;}
.breadcrumb a{color:var(--muted);text-decoration:none;}
.breadcrumb a:hover{color:var(--text);}
main{max-width:1100px;margin:0 auto;padding:32px;}
.grid{display:grid;grid-template-columns:1fr 420px;gap:24px;}
.video-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
video{width:100%;display:block;background:#000;}
.video-meta-bar{padding:12px 16px;display:flex;align-items:center;gap:10px;border-top:1px solid var(--border);}
.badge{font-size:10px;padding:2px 8px;border-radius:4px;font-family:var(--mono);}
.badge-shorts{background:#ff3f3f22;color:var(--accent);}
.badge-normal{background:#4fc3f722;color:#4fc3f7;}
.side-panel{display:flex;flex-direction:column;gap:16px;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;}
.panel h3{font-size:13px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;}
.form-group{margin-bottom:12px;}
label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
input,textarea,select{width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:7px;padding:8px 11px;color:var(--text);font-family:var(--sans);font-size:13px;
  transition:border-color .15s;outline:none;}
input:focus,textarea:focus,select:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:80px;}
.char-count{font-size:10px;color:var(--muted);text-align:right;margin-top:2px;}
.btn{padding:9px 18px;border-radius:7px;font-size:13px;font-weight:500;
  cursor:pointer;border:none;transition:all .15s;font-family:var(--sans);width:100%;margin-top:6px;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#ff6060;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{border-color:#3e3e50;color:var(--text);}
.btn-green{background:var(--green);color:#000;font-weight:700;}
.btn-green:hover{background:#33ff8a;}
.slot-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:6px;}
.slot-item{padding:7px 10px;border:1px solid var(--border);border-radius:6px;
  cursor:pointer;font-size:11px;display:flex;justify-content:space-between;
  align-items:center;transition:all .15s;}
.slot-item:hover,.slot-item.sel{border-color:var(--accent2);background:#ffaa0012;color:var(--accent2);}
.slot-day{font-family:var(--mono);font-size:10px;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;
  background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:9px 12px;}
.toggle{position:relative;width:38px;height:22px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:#2a2a38;border-radius:11px;transition:.2s;cursor:pointer;}
.toggle-slider:before{content:'';position:absolute;width:16px;height:16px;
  left:3px;bottom:3px;background:#666;border-radius:50%;transition:.2s;}
.toggle input:checked + .toggle-slider{background:var(--accent);}
.toggle input:checked + .toggle-slider:before{transform:translateX(16px);background:#fff;}
.status-bar{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:8px;display:none;}
.status-bar.ok{background:#00e67618;border:1px solid #00e67640;color:var(--green);}
.status-bar.err{background:#ff3f3f18;border:1px solid #ff3f3f40;color:var(--accent);}
.thumb-preview img{width:100%;border-radius:8px;margin-top:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:13px;height:13px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;}
</style>
</head>
<body>
<nav>
  <div class="logo">YT</div>
  <div class="breadcrumb">
    <a href="/">Kanallar</a> /
    <a href="/channel/{{ channel.id }}">{{ channel.name }}</a> /
    <span style="color:var(--text)">{{ video_rel.split('/')[-1] }}</span>
  </div>
</nav>

<main>
  <div class="grid">
    <!-- SOL: Video -->
    <div>
      <div class="video-wrap">
        <video controls preload="metadata"
          src="/api/video/stream/{{ channel.id }}/{{ video_rel }}">
        </video>
        <div class="video-meta-bar">
          <span class="badge badge-normal" id="type-badge">NORMAL</span>
          <span style="font-size:12px;color:var(--muted);font-family:var(--mono)">{{ video_rel.split('/')[-1] }}</span>
        </div>
      </div>

      <!-- Kapak -->
      <div class="panel" style="margin-top:16px;">
        <h3>Kapak Fotoğrafı</h3>
        <div class="thumb-preview">
          <img id="thumb-img"
            src="/api/video/thumbnail/{{ channel.id }}/{{ video_rel }}"
            onerror="this.style.display='none';document.getElementById('no-thumb').style.display='block'">
          <p id="no-thumb" style="display:none;color:var(--muted);font-size:13px;">
            📷 Kapak yok — aynı isimde .jpg dosyası ekleyin
          </p>
        </div>
      </div>
    </div>

    <!-- SAĞ: Panel -->
    <div class="side-panel">

      <!-- Metadata -->
      <div class="panel">
        <h3>Video Bilgileri</h3>

        <div class="form-group">
          <label>Video Tipi</label>
          <div class="toggle-row">
            <div>
              <div id="type-label" style="font-size:13px">Normal Video</div>
              <div style="font-size:11px;color:var(--muted)">Shorts için 9:16 dikey olmalı</div>
            </div>
            <label class="toggle">
              <input type="checkbox" id="f-shorts" onchange="onTypeToggle()">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label>Başlık <span id="title-count" class="char-count">0/100</span></label>
          <input type="text" id="f-title" maxlength="100"
            oninput="document.getElementById('title-count').textContent=this.value.length+'/100'">
        </div>

        <div class="form-group">
          <label>Açıklama</label>
          <textarea id="f-desc" rows="5"></textarea>
        </div>

        <div class="form-group">
          <label>Etiketler (virgülle ayır)</label>
          <input type="text" id="f-tags">
        </div>

        <div class="form-group">
          <label>Gizlilik</label>
          <select id="f-privacy">
            <option value="private">Gizli (zamanlanmış)</option>
            <option value="public">Herkese Açık</option>
            <option value="unlisted">Listelenmemiş</option>
          </select>
        </div>

        <button class="btn btn-ghost" onclick="generateAI()">✨ AI Öneri</button>
        <button class="btn btn-ghost" onclick="saveMeta()">💾 Meta Kaydet</button>
      </div>

      <!-- Zamanlama -->
      <div class="panel">
        <h3>Yayın Zamanı</h3>
        <div class="form-group">
          <label>Tarih & Saat</label>
          <input type="datetime-local" id="f-publish">
        </div>
        <div class="slot-grid" id="slot-grid">
          <div style="color:var(--muted);font-size:12px;grid-column:1/-1">Yükleniyor...</div>
        </div>
      </div>

      <!-- Yükleme -->
      <div class="panel">
        <h3>Yükleme</h3>
        <button class="btn btn-primary" onclick="saveMeta()">💾 Önce Kaydet</button>
        <button class="btn btn-green" onclick="uploadVideo()">▲ YouTube'a Gönder</button>
        <div class="status-bar" id="status"></div>
      </div>

    </div>
  </div>
</main>

<script>
var CHANNEL_ID = "{{ channel.id }}";
var VIDEO_REL  = "{{ video_rel }}";
var LANG       = "{{ channel.language }}";
var STEM       = VIDEO_REL.split('/').pop().replace(/\.[^.]+$/, '');

// Sayfa yükle
window.addEventListener('DOMContentLoaded', function() {
  loadMeta();
  loadSlots(false);
});

function loadMeta() {
  fetch('/api/channels/' + CHANNEL_ID + '/video-meta/' + encodeURIComponent(VIDEO_REL))
    .then(function(r) { return r.json(); })
    .then(function(m) {
      if (!m || !Object.keys(m).length) return;
      document.getElementById('f-title').value   = m.title || '';
      document.getElementById('f-desc').value    = m.description || '';
      document.getElementById('f-tags').value    = (m.tags || []).join(', ');
      document.getElementById('f-privacy').value = m.privacy || 'private';
      document.getElementById('f-shorts').checked = !!m.is_shorts;
      document.getElementById('title-count').textContent = (m.title||'').length + '/100';
      onTypeToggle();
      if (m.publish_at) {
        document.getElementById('f-publish').value = toLocalInput(new Date(m.publish_at));
      }
    });
}

function onTypeToggle() {
  var isShorts = document.getElementById('f-shorts').checked;
  document.getElementById('type-label').textContent  = isShorts ? 'Shorts (9:16)' : 'Normal Video (16:9)';
  document.getElementById('type-badge').textContent  = isShorts ? 'SHORTS' : 'NORMAL';
  document.getElementById('type-badge').className    = 'badge ' + (isShorts ? 'badge-shorts' : 'badge-normal');
  loadSlots(isShorts);
}

function loadSlots(isShorts) {
  var vtype = isShorts ? 'vertical' : 'horizontal';
  fetch('/api/channels/' + CHANNEL_ID + '/next-slots?type=' + vtype + '&count=6')
    .then(function(r) { return r.json(); })
    .then(function(slots) {
      var el = document.getElementById('slot-grid');
      if (!slots.length) { el.innerHTML = '<div style="color:var(--muted);font-size:12px">Slot bulunamadı</div>'; return; }
      el.innerHTML = slots.map(function(s) {
        return '<div class="slot-item" data-dt="' + s.datetime + '" onclick="selectSlot(this)">' +
          '<span class="slot-day">' + s.weekday + '</span>' +
          '<span style="font-size:11px">' + s.display + '</span></div>';
      }).join('');
    });
}

function selectSlot(el) {
  document.querySelectorAll('.slot-item').forEach(function(i) { i.classList.remove('sel'); });
  el.classList.add('sel');
  document.getElementById('f-publish').value = toLocalInput(new Date(el.getAttribute('data-dt')));
}

function generateAI() {
  showStatus('⏳ AI üretiyor...', '');
  fetch('/api/ai/generate', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({channel_id: CHANNEL_ID, video_name: STEM, lang: LANG})
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.ok && data.meta) {
      document.getElementById('f-title').value = data.meta.title || '';
      document.getElementById('f-desc').value  = data.meta.description || '';
      document.getElementById('f-tags').value  = (data.meta.tags || []).join(', ');
      document.getElementById('title-count').textContent = (data.meta.title||'').length + '/100';
      showStatus('✓ AI önerisi uygulandı', 'ok');
    } else { showStatus('✕ ' + (data.error || 'Hata'), 'err'); }
  });
}

function saveMeta() {
  var meta = collectMeta();
  fetch('/api/channels/' + CHANNEL_ID + '/video-meta', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({video_rel: VIDEO_REL, meta: meta})
  })
  .then(function() { showStatus('✓ Kaydedildi', 'ok'); });
}

function uploadVideo() {
  var meta = collectMeta();
  if (!meta.title) { showStatus('✕ Başlık zorunlu', 'err'); return; }
  var pubStr = meta.publish_at ? '\n📅 ' + new Date(meta.publish_at).toLocaleString('tr') : '';
  if (!confirm('"' + meta.title + '" YouTube\'a yüklensin mi?' + pubStr)) return;

  showStatus('<span class="spinner"></span> Yükleniyor...', '');
  fetch('/api/upload', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({channel_id: CHANNEL_ID, video_rel: VIDEO_REL, metadata: meta, publish_social: true})
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.status === 'uploading') {
      showStatus('✓ Yükleme başlatıldı! YouTube\'da işleniyor...', 'ok');
    } else { showStatus('✕ Hata: ' + JSON.stringify(data), 'err'); }
  });
}

function collectMeta() {
  var publishLocal = document.getElementById('f-publish').value;
  return {
    title:       document.getElementById('f-title').value.trim(),
    description: document.getElementById('f-desc').value.trim(),
    tags:        document.getElementById('f-tags').value.split(',').map(function(t){return t.trim();}).filter(Boolean),
    privacy:     document.getElementById('f-privacy').value,
    is_shorts:   document.getElementById('f-shorts').checked,
    publish_at:  publishLocal ? new Date(publishLocal).toISOString() : null
  };
}

function showStatus(msg, type) {
  var el = document.getElementById('status');
  el.innerHTML = msg;
  el.className = 'status-bar' + (type ? ' ' + type : '');
  el.style.display = 'block';
}

function toLocalInput(dt) {
  var p = function(n) { return String(n).padStart(2, '0'); };
  return dt.getFullYear() + '-' + p(dt.getMonth()+1) + '-' + p(dt.getDate()) +
    'T' + p(dt.getHours()) + ':' + p(dt.getMinutes());
}
</script>
</body>
</html>
